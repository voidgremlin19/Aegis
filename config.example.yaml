# Project Aegis – Example Configuration File
# ------------------------------------------
# Copy this file to your project root as e.g. "config.yaml" and edit values.
# Run `aegis calibrate --model <model> --output config.yaml` to auto-generate
# a calibrated version for your specific model.
#
# All thresholds are cosine-similarity values in [-1, 1].
# All strength/gain values are fractions of the activation norm.

# ─────────────────────────────────────────────────────────────────────────────
# GPT-2 (default / development)
# ─────────────────────────────────────────────────────────────────────────────
model_name: "gpt2"

# Device: "auto" selects MPS > CUDA > CPU automatically
device: "auto"

# Layer index to attach the hook. null = auto-select via suggest_layer()
target_layer: 8

# ── Module A: Threat Neutralizer ─────────────────────────────────────────────
# Triggers when cosine similarity between the activation and the desperate
# vector exceeds this value. Lower = more sensitive.
threat_threshold: 0.12

# Fraction of ||x_t|| injected as "calm" vector when triggered.
steering_strength: 0.08

# Clamp modified activations to ±clip_value * ||x_t|| (null = no clamping)
clip_value: 0.5

# ── Module B: Deception Tripwire ──────────────────────────────────────────────
# Raises DeceptionDetectedException and halts generation when the anger or
# fear deflection circuits exceed this threshold.
deception_threshold: 0.15

# ── Module C: Arousal Regulator ───────────────────────────────────────────────
# Mean arousal similarity across the prompt above which empathy injection
# activates. Lower values = more sensitive to user frustration.
arousal_threshold: 0.08

# Proportional gain: injection_strength = injection_gain * (arousal - threshold)
injection_gain: 0.12

# Hard cap on empathy injection per token (fraction of ||x_t||)
max_injection: 0.15

# ── Module D: Goldilocks Tuner ────────────────────────────────────────────────
# Valence is pushed down if above sycophancy_threshold (too agreeable)
sycophancy_threshold: 0.12

# Valence is pushed up if below harshness_threshold (too cold/blunt)
harshness_threshold: -0.06

# Proportional gain on valence deviation
tuner_gain: 0.25

# Hard cap on valence steering per token (fraction of ||x_t||)
max_steer: 0.10

# ── Generation defaults ───────────────────────────────────────────────────────
max_new_tokens: 80
temperature: 0.7
top_p: 1.0

# ── Security ──────────────────────────────────────────────────────────────────
# Set the environment variable AEGIS_API_KEY to your secret key.
# Requests to /api/* without a matching X-API-Key header will be rejected.
api_key_env_var: "AEGIS_API_KEY"

# Max requests per minute per IP on streaming endpoints
rate_limit_rpm: 60

# ── Audit logging ─────────────────────────────────────────────────────────────
audit_log_path: "audit.log"
audit_log_max_bytes: 10485760   # 10 MB
audit_log_backup_count: 5

